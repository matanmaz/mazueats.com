<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MAZU — Yellow Springs</title>
  <link rel="icon" href="img/core-img/favicon.ico" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="index">

  <!-- Shared header injected by assets/js/main.js -->
  <div id="site-header"></div>

  <main>
    <!--
      HOME SLIDESHOW
      To add/remove photos: just add/remove <img> tags inside .slideshow-track.
      To change how many show at once or how fast it scrolls, edit the CSS
      variables --slide-visible, --slide-height, --slide-gap, --slide-speed
      at the top of assets/css/styles.css.
    -->
    <section class="slideshow">
      <div class="slideshow-track">
        <img src="img/about-img/3.jpg"  alt="" />
        <img src="img/about-img/2.jpg"  alt="" />
        <img src="img/about-img/4.jpg"  alt="" />
        <img src="img/about-img/5.jpg"  alt="" />
        <img src="img/about-img/6.jpg"  alt="" />
        <img src="img/about-img/7.jpg"  alt="" />
        <img src="img/about-img/9.jpg"  alt="" />
        <img src="img/about-img/12.jpg" alt="" />
        <img src="img/about-img/13.jpg" alt="" />
        <img src="img/about-img/14.jpg" alt="" />
        <img src="img/about-img/15.jpg" alt="" />
        <img src="img/about-img/16.jpg" alt="" />
      </div>

      <div class="slideshow-controls">
        <button class="prev" aria-label="Previous">&#10094;</button>
        <button class="next" aria-label="Next">&#10095;</button>
      </div>
    </section>
  </main>

  <!-- Shared footer injected by assets/js/main.js -->
  <div id="site-footer"></div>

  <script src="assets/js/main.js"></script>
</body>
</html>
